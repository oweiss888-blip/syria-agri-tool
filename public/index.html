<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agri Syria Export</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FAF7F2;color:#1A1A18;font-size:14px}
:root{
  --olive:#1B3A28;--olive2:#264D35;--gold:#C8953A;--goldt:#E8B558;
  --sand:#FAF7F2;--cream:#F2EDE4;--white:#fff;
  --ink:#1A1A18;--ink2:#4A4A46;--ink3:#888880;--ink4:#C8C5BC;
  --border:#E8E3D8;--border2:#F0EBE0;
  --gbg:#EAF2EC;--gtx:#1B5C2E;--abg:#FEF3DD;--atx:#7A5000;
  --rbg:#FDE8E8;--rtx:#8A1A1A;--bbg:#E8F2FD;--btx:#1A4A8A;
  --sh:0 2px 12px rgba(0,0,0,.08);--sh2:0 8px 32px rgba(0,0,0,.12);
}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:210px;flex-shrink:0;background:var(--olive);display:flex;flex-direction:column}
.sb-top{padding:1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-eye{font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:5px}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;display:flex;align-items:center;gap:8px}
.sb-ico{width:26px;height:26px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
nav{flex:1;padding:8px 0;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 1rem;background:transparent;border:none;font-size:13px;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.55);text-align:left;cursor:pointer;transition:all .15s;position:relative}
.nb:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.nb.on{color:#fff;font-weight:500;background:rgba(255,255,255,.1)}
.nb.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 2px 2px 0}
.nb-i{width:16px;text-align:center;font-size:13px}
.sb-bot{padding:.75rem 1rem;border-top:1px solid rgba(255,255,255,.1)}
.lang-sw{display:flex;border:1px solid rgba(255,255,255,.2);border-radius:8px;overflow:hidden;margin-bottom:.75rem}
.ls-b{flex:1;padding:6px 0;border:none;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;color:rgba(255,255,255,.45);background:transparent;transition:all .15s}
.ls-b.on{background:rgba(255,255,255,.15);color:#fff}
.cost-w{background:rgba(0,0,0,.25);border-radius:8px;padding:.75rem;font-size:11px;color:rgba(255,255,255,.35)}
.cost-amt{font-size:20px;font-weight:600;color:var(--goldt);font-variant-numeric:tabular-nums;line-height:1.1;margin:3px 0}
#user-chip{cursor:pointer;padding:.5rem 0;font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:.25rem}
#user-chip:hover{color:rgba(255,255,255,.7)}

/* MAIN */
.main{flex:1;overflow-y:auto}
.pg{display:none;padding:2rem 2.5rem;max-width:860px;animation:fi .2s ease}
.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pg-eye{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.pg-h{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--ink);margin-bottom:4px}
.pg-sub{font-size:13px;color:var(--ink3);margin-bottom:1.5rem}
.hr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:1.5rem}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--gold)}
.c-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.c-t{font-size:13px;font-weight:600;margin-bottom:3px}
.c-d{font-size:11px;color:var(--ink3);line-height:1.5}

/* ALERTS */
.al{padding:.75rem 1rem;border-radius:10px;font-size:12.5px;line-height:1.7;margin-bottom:1rem;display:flex;gap:10px}
.al i{flex-shrink:0;font-size:14px}
.al-ok{background:var(--gbg);border:1px solid #B8D8BE;color:var(--gtx)}
.al-wa{background:var(--abg);border:1px solid #F0D080;color:var(--atx)}
.al-er{background:var(--rbg);border:1px solid #F0A0A0;color:var(--rtx)}
.al-in{background:var(--bbg);border:1px solid #A0C8F0;color:var(--btx)}
.al-ne{background:var(--cream);border:1px solid var(--border);color:var(--ink2)}

/* INPUTS */
input,select,textarea{display:block;outline:none;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--olive2);box-shadow:0 0 0 3px rgba(38,77,53,.1)}
textarea{resize:vertical}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;outline:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;background:var(--white);color:var(--ink);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--cream)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.bp{background:var(--olive);color:#fff;border-color:var(--olive)}
.bp:hover:not(:disabled){background:var(--olive2)}
.bg{background:var(--gold);color:#fff;border-color:var(--gold)}
.bg:hover:not(:disabled){background:var(--goldt)}
.bs{padding:5px 10px;font-size:12px;border-radius:7px}
.bd{color:var(--rtx);border-color:#F0C0C0}.bd:hover{background:var(--rbg)}
.sr{display:flex;gap:8px;align-items:center;margin-bottom:.75rem}
.sr input{flex:1}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.tag{font-size:11px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--ink2);transition:all .15s}
.tag:hover{background:var(--olive);color:#fff;border-color:var(--olive)}

/* COST MONITOR */
.cm{display:none;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(135deg,var(--olive),var(--olive2));border-radius:10px;margin-bottom:.75rem}
.cm-v{font-size:20px;font-weight:700;color:var(--goldt);font-variant-numeric:tabular-nums}
.cm-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.cm-t{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.cm-n{margin-left:auto;font-size:10px;color:rgba(255,255,255,.4);text-align:right;line-height:1.4}

/* RESULT */
.res{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:.75rem;box-shadow:var(--sh)}
.res-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.res-l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.cp{font-size:11px;padding:3px 8px;background:var(--gbg);border:1px solid #B8D8BE;border-radius:20px;color:var(--gtx);font-variant-numeric:tabular-nums}
.res-bar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border2);flex-wrap:wrap}
.lb{font-size:11px;padding:4px 9px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:var(--sand);color:var(--ink2);font-family:'DM Sans',sans-serif;transition:all .15s}
.lb.on{background:var(--olive);color:#fff;border-color:var(--olive)}

/* MARKDOWN */
.md h1,.md h2,.md h3{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--ink);margin:1rem 0 .5rem}
.md h2{font-size:16px;border-bottom:1px solid var(--border2);padding-bottom:3px}
.md h3{font-size:14px;color:var(--olive)}
.md p{margin:.5rem 0;line-height:1.8}
.md ul,.md ol{padding-left:1.5rem;margin:.5rem 0}
.md li{margin:.3rem 0;line-height:1.7}
.md strong{font-weight:600}
.md a{color:var(--olive);text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}
[dir=rtl].md ul,[dir=rtl].md ol{padding-left:0;padding-right:1.5rem}

/* SCAN */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1rem}
.sc{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.sc-top{padding:.875rem 1.125rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.sc-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch}
.sc-body{padding:1rem 1.125rem;font-size:12.5px;line-height:1.75;color:var(--ink2);min-height:150px;max-height:260px;overflow-y:auto}
.sc-body.empty{color:var(--ink4);font-style:italic}
.sc-foot{padding:.6rem 1.125rem;border-top:1px solid var(--border2);display:flex;gap:5px;flex-wrap:wrap;background:var(--sand)}
.sc-badge{font-size:9px;padding:2px 7px;background:var(--gbg);color:var(--gtx);border-radius:20px;display:none}
.prog{height:2px;background:var(--border2)}
.prog-b{height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));width:0;transition:width .4s}

/* ITEMS */
.item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:.875rem 1.125rem;margin-bottom:8px;transition:border-color .15s}
.item:hover{border-color:var(--gold)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;margin-left:5px}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--olive2),var(--olive));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.fb{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--sh)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.empty{text-align:center;padding:3rem 1rem;color:var(--ink3);font-size:13px}

/* BERICHTE */
.ber-item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:.875rem 1.125rem;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.ber-item:hover{border-color:var(--gold)}

/* TABS */
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:9px 15px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .15s}
.tab.on{color:var(--olive);font-weight:600;border-bottom-color:var(--olive)}

/* AC CARDS */
.ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.ac{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.ac:hover{border-color:var(--gold);box-shadow:var(--sh)}
.ac-body{padding:1.125rem}
.ac-foot{padding:.625rem 1.125rem;border-top:1px solid var(--border2);background:var(--sand);display:flex;gap:6px;flex-wrap:wrap}
.ac-exp{display:none;padding:1rem 1.125rem;border-top:1px solid var(--border2);background:var(--cream);font-size:12.5px;line-height:1.8;color:var(--ink2)}
.ac-exp.on{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:1rem}
.stat-v{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--olive);font-variant-numeric:tabular-nums}
.stat-l{font-size:11px;color:var(--ink3);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;background:var(--cream);border-bottom:1px solid var(--border);font-weight:500;color:var(--ink3);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
td{padding:8px 12px;border-bottom:1px solid var(--border2);color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sand)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:center;justify-content:center;padding:1rem}
.modal.on{display:flex}
.modal-box{background:var(--white);border-radius:16px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--ink3);margin-bottom:1.25rem}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--olive);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}

/* PROGRESS */
.po{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:998;display:none;align-items:center;justify-content:center}
.po.on{display:flex}
.po-box{background:var(--white);border-radius:16px;padding:2rem;min-width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.po-title{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:6px}
.po-status{font-size:13px;color:var(--ink3);margin-bottom:1rem}
.po-bar-w{background:var(--cream);border-radius:4px;height:6px;overflow:hidden}
.po-bar{height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));width:0;transition:width .3s}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sb">
  <div class="sb-top">
    <div class="sb-eye">Beta v0.3</div>
    <div class="sb-logo"><div class="sb-ico">рҹҢҫ</div><span id="sb-name">Agri Syria</span></div>
  </div>
  <nav id="nav"></nav>
  <div class="sb-bot">
    <div class="lang-sw">
      <button class="ls-b on" id="ls-de" onclick="setLang('de')">рҹҮ©рҹҮӘ DE</button>
      <button class="ls-b" id="ls-ar" onclick="setLang('ar')">рҹҮёрҹҮҰ AR</button>
    </div>
    <div class="cost-w">
      <div style="font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.35);text-transform:uppercase">API-Kosten</div>
      <div class="cost-amt" id="sb-cost">$0.0000</div>
      <div style="font-size:10px;color:rgba(255,255,255,.35)" id="sb-calls">0 Calls</div>
    </div>
    <div id="user-chip" onclick="resetUser()">рҹ‘Ө <span id="user-name-display">...</span> вңҺ</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

</div><!-- /app -->

<!-- MODALS -->
<div class="modal on" id="modal-user">
  <div class="modal-box" style="text-align:center">
    <div style="font-size:40px;margin-bottom:12px">рҹҢҫ</div>
    <div class="modal-title">Willkommen</div>
    <div class="modal-sub">Wie heiГҹt du? So sehen alle wer was hinzugefГјgt hat.</div>
    <input id="u-name" placeholder="Dein Name" style="text-align:center;font-size:15px;margin-bottom:1rem" onkeydown="if(event.key==='Enter')saveUser()">
    <button class="btn bp" onclick="saveUser()" style="width:100%;justify-content:center;padding:10px">Los geht's вҶ’</button>
  </div>
</div>

<div class="modal" id="modal-add-report" onclick="if(event.target===this)closeModal('modal-add-report')">
  <div class="modal-box">
    <div class="modal-title">вңҸпёҸ Text einfГјgen</div>
    <div class="modal-sub">Strg+V вҶ’ Text aus PDF, Word oder E-Mail einfГјgen</div>
    <label style="font-size:11px;color:var(--ink3);margin-bottom:4px;display:block">Text:</label>
    <textarea id="add-text" rows="9" placeholder="Text hier einfГјgen..." style="margin-bottom:10px"></textarea>
    <label style="font-size:11px;color:var(--ink3);margin-bottom:4px;display:block">Titel:</label>
    <input id="add-titel" placeholder="z.B. KFZ-Teile Syrien Recherche" style="margin-bottom:12px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-add-report')">Abbrechen</button>
      <button class="btn bp" onclick="saveManualReport()">рҹ’ҫ Speichern</button>
    </div>
  </div>
</div>

<div class="po" id="progress">
  <div class="po-box">
    <div style="font-size:32px;margin-bottom:8px" id="po-ico">вҸі</div>
    <div class="po-title" id="po-title">Bitte warten...</div>
    <div class="po-status" id="po-status">Verarbeite...</div>
    <div class="po-bar-w"><div class="po-bar" id="po-bar"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// UTILS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const $ = id => document.getElementById(id);
const esc = t => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = u => '$' + (u||0).toFixed(4);
const fmtS = u => (u||0) < 0.01 ? '$' + (u||0).toFixed(4) : '$' + (u||0).toFixed(3);
const safe = t => { const s=String(t||'').trim(); return s && s!=='undefined' && s!=='null' && s.length>0 ? s : ''; };
const mdParse = t => { const s=safe(t); if(!s)return ''; return typeof marked!=='undefined'?marked.parse(s):'<pre>'+esc(s)+'</pre>'; };
const setH = (id,h) => { const e=typeof id==='string'?$(id):id; if(e) e.innerHTML=h; };
const setT = (id,t) => { const e=$(id); if(e) e.textContent=t; };

function toast(msg, dur=2500) {
  const t=$('toast'); if(!t)return;
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), dur);
}

function showProg(title, status, pct) {
  const o=$('progress'); if(o)o.classList.add('on');
  setT('po-title',title); setT('po-status',status);
  const b=$('po-bar'); if(b)b.style.width=Math.min(100,pct)+'%';
  setT('po-ico', pct>=100?'вң…':'вҸі');
}
function hideProg(){ setTimeout(()=>{ const o=$('progress');if(o)o.classList.remove('on');},700); }

function openModal(id){ const m=$(id);if(m)m.classList.add('on'); }
function closeModal(id){ const m=$(id);if(m)m.classList.remove('on'); }

async function callAI(sysKey, userMsg, modul) {
  const detail = (modul==='markt'||modul==='finanz') && DETAIL[modul];
  const body = {
    model:'claude-sonnet-4-6', max_tokens: detail?2500:1000,
    system: SYS[sysKey]||SYS.kapital,
    messages:[{role:'user',content:String(userMsg||'')}],
    _modul:modul, _query:String(userMsg||'').substring(0,80), _user:currentUser||'?'
  };
  if(WEB[sysKey]) body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const r = await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d = await r.json();
  return d;
}

function getAIText(data) {
  if(!data||!data.content) return '';
  return data.content.filter(b=>b&&b.type==='text').map(b=>b.text||'').join('\n');
}

async function translateToAr(text) {
  if(!safe(text)) return null;
  try {
    const d = await callAI('translate_ar', text, 'translate');
    const t = getAIText(d);
    return safe(t) ? t : null;
  } catch { return null; }
}

function initUser() {
  const saved = localStorage.getItem('agri-user');
  if(saved && safe(saved)) { currentUser=saved; setT('user-name-display',saved); closeModal('modal-user'); }

}

  const n = safe($('u-name')?.value||'');

  currentUser=n; localStorage.setItem('agri-user',n);
  setT('user-name-display',n); closeModal('modal-user'); toast('рҹ‘Ӣ Hallo '+n+'!');
}
function resetUser() {
  if(!confirm('Namen ГӨndern?')) return;
  localStorage.removeItem('agri-user'); currentUser='';
  setH('u-name',''); openModal('modal-user');
}

// ESTIMATE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const estTimers = {};
async function showEst(mod) {
  clearTimeout(estTimers[mod]);
  estTimers[mod] = setTimeout(async()=>{
    const q = $(mod+'-q')?.value?.trim()||'';
    const el=$(mod+'-est');
    if(!q||!el){if(el)el.style.display='none';return;}
    try{
      const r=await fetch('/api/estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:SYS[mod]||'',user:q})});
      const d=await r.json();
      const detail=(mod==='markt'||mod==='finanz')&&DETAIL[mod];
      const estOut=detail?2000:500;
      const cost=(d.estInput/1e6*3)+(estOut/1e6*15);
      const tokEl=$(mod+'-ev'); if(tokEl)tokEl.textContent=fmtS(cost);
      const etEl=$(mod+'-et'); if(etEl)etEl.textContent='~'+(d.estInput+estOut).toLocaleString('de-DE')+' Tokens'+(detail?' (AusfГјhrlich)':'');
      el.style.display='flex';
    }catch{}
  },400);
}

// RUN AI (search modules)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const arCache = {};

async function runAI(mod) {
  const qEl=$(mod+'-q'), outEl=$(mod+'-out'), btnEl=$(mod+'-btn');
  if(!qEl||!outEl||!btnEl){ console.error('runAI missing el:',mod); return; }
  const q=qEl.value.trim(); if(!q) return;
  const estEl=$(mod+'-est'); if(estEl)estEl.style.display='none';
  outEl.innerHTML='<div style="text-align:center;padding:2rem;color:var(--ink3)">вҸі KI arbeitet...</div>';
  btnEl.disabled=true; btnEl.textContent='LГӨuft...';
  try{
    const data=await callAI(mod,q,mod);
    if(data.error) throw new Error(data.error.message||String(data.error));
    const text=getAIText(data);
    if(!safe(text)) throw new Error('Keine Antwort erhalten');
    const c=data._cost;
    const cp=c?'<span class="cp">рҹ’° '+fmtS(c.costUSD)+' В· '+(c.inputTokens+c.outputTokens).toLocaleString('de-DE')+' Tok</span>':'';
    const rid='r'+Date.now();
    // Build result DOM safely
    const box=document.createElement('div'); box.className='res'; box.id=rid;
    box.innerHTML='<div class="res-h"><span class="res-l">Ergebnis</span>'+cp+'</div><div class="md" id="'+rid+'-txt" dir="ltr"></div><div class="res-bar"><span style="font-size:11px;color:var(--ink4)">Sprache:</span><button class="lb on" id="'+rid+'-de">рҹҮ©рҹҮӘ DE</button><button class="lb" id="'+rid+'-ar">рҹҮёрҹҮҰ AR</button><button class="lb" style="margin-left:auto;background:var(--abg);color:var(--atx)" id="'+rid+'-proj">рҹ“Ң Projekt</button><button class="lb" style="background:var(--bbg);color:var(--btx)" id="'+rid+'-pdf">в¬Ү PDF</button><button class="lb" style="background:var(--gbg);color:var(--gtx)" id="'+rid+'-save">рҹ’ҫ Speichern</button></div>';
    // Set content using querySelector (always safe - searches within box)
    const txtEl=box.querySelector('#'+rid+'-txt');
    if(txtEl){txtEl.innerHTML=mdParse(text);txtEl.dataset.de=text;}
    // Attach handlers
    const db=box.querySelector('#'+rid+'-de'); if(db)db.onclick=()=>switchLang(rid,'de');
    const ab=box.querySelector('#'+rid+'-ar'); if(ab)ab.onclick=()=>switchLang(rid,'ar');
    const pb=box.querySelector('#'+rid+'-proj'); if(pb)pb.onclick=()=>saveAsProject(q,text,mod);
    const pdb=box.querySelector('#'+rid+'-pdf'); if(pdb)pdb.onclick=()=>{const t=box.querySelector('#'+rid+'-txt');openPDF('Recherche: '+q,t?t.innerHTML:'');};
    const sb=box.querySelector('#'+rid+'-save'); if(sb)sb.onclick=()=>autoSaveReport(q,text,mod,sb);
    // Prepend
    outEl.innerHTML=''; outEl.appendChild(box);
    // Auto-save
    autoSaveReport(q,text,mod,null);
    refreshCost();
  }catch(e){
    outEl.innerHTML='<div class="al al-er"><i>вқҢ</i><div>'+esc(e.message)+'</div></div>';
  }
  btnEl.disabled=false; btnEl.textContent=BTNLBL[mod]||'вҶ— Suchen';
}

async function switchLang(rid, lang) {
  const box=$(rid); if(!box) return;
  const txt=box.querySelector('#'+rid+'-txt'); if(!txt) return;
  const db=box.querySelector('#'+rid+'-de'); if(db)db.classList.toggle('on',lang==='de');
  const ab=box.querySelector('#'+rid+'-ar'); if(ab)ab.classList.toggle('on',lang==='ar');
  if(lang==='de'){txt.dir='ltr';txt.innerHTML=mdParse(txt.dataset.de||'');return;}
  const ck=rid+'_ar';
  if(arCache[ck]){txt.dir='rtl';txt.innerHTML=mdParse(arCache[ck]);return;}
  txt.textContent='Ш¬Ш§ШұЩҚ Ш§Щ„ШӘШұШ¬Щ…Ш©...'; txt.dir='rtl';
  const ar=await translateToAr(txt.dataset.de||'');
  if(ar){arCache[ck]=ar;txt.innerHTML=mdParse(ar);}
  else txt.textContent='Ш®Ш·ШЈ ЩҒЩҠ Ш§Щ„ШӘШұШ¬Щ…Ш©.';
}

function qRun(mod,q){ const el=$(mod+'-q');if(el){el.value=q;el.focus();}showEst(mod); }
function setDetail(mod,on){ DETAIL[mod]=on;const a=$(mod+'-don'),b=$(mod+'-dof');if(a)a.classList.toggle('on',on);if(b)b.classList.toggle('on',!on);showEst(mod); }

const SCANS={recht:{sys:'scan_recht',q:'Aktuelle Rechtslage EU Sanktionen Syrien Export 2025 2026'},foerder:{sys:'scan_foerder',q:'Aktuelle FГ¶rderungen Syrien Agrar Wiederaufbau 2025 2026'},markt:{sys:'scan_markt',q:'Aktuelle Marktlage Syrien Agrarprodukte Bedarf 2025 2026'},politik:{sys:'scan_politik',q:'Aktuelle politische Entwicklungen Syrien Agrar Export 2025 2026'}};
const scanArCache={};

async function runScan(key) {
  const body=$(key+'-body'), ageEl=$(key+'-age'), badge=$(key+'-badge');
  if(!body){console.error('scan: no body for',key);return;}
  body.className='sc-body'; body.textContent='Scanne...';
  if(badge)badge.style.display='none';
  try{
    const cfg=SCANS[key];
    const data=await callAI(cfg.sys,cfg.q,'scan_'+key);
    const text=getAIText(data);
    if(!safe(text)) throw new Error('Keine Antwort');
    body.innerHTML=mdParse(text); body.dataset.de=text;
    const now=new Date();
    const ds=now.toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
    const ts=now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    if(ageEl)ageEl.textContent=ds+' В· '+ts;
    if(badge){badge.textContent='вң“ '+ds;badge.style.display='block';}
    delete scanArCache[key];
    // Save scan result
    const saved=await sGet('scan-results')||{};
    saved[key]={text,ds,ts,datum:ds};
    await sSet('scan-results',saved);
    refreshCost();
  }catch(e){
    body.textContent='Fehler: '+e.message;
    if(ageEl)ageEl.textContent='Fehler';
  }
}

async function scanLang(key,lang) {
  const body=$(key+'-body'); if(!body) return;
  const db=$(key+'-lb-de'), ab=$(key+'-lb-ar');
  if(db)db.classList.toggle('on',lang==='de');
  if(ab)ab.classList.toggle('on',lang==='ar');
  if(lang==='de'){
    body.dir='ltr';
    if(body.dataset.de) body.innerHTML=mdParse(body.dataset.de);
    return;
  }
  if(scanArCache[key]){body.dir='rtl';body.innerHTML=mdParse(scanArCache[key]);return;}
  body.textContent='Ш¬Ш§ШұЩҚ Ш§Щ„ШӘШұШ¬Щ…Ш©...'; body.dir='rtl';
  const ar=await translateToAr(body.dataset.de||'');
  if(ar){scanArCache[key]=ar;body.innerHTML=mdParse(ar);}
  else body.textContent='Ш®Ш·ШЈ ЩҒЩҠ Ш§Щ„ШӘШұШ¬Щ…Ш©.';
}

async function saveScanReport(key,title,bilingual) {
  const saved=await sGet('scan-results')||{};
  const scan=saved[key]; if(!scan?.text){toast('Bitte erst scannen!');return;}
  const btn=$(key+'-save'+(bilingual?'-bi':'-de'));
  if(btn){btn.disabled=true;btn.textContent='вҸі';}
  const datum=scan.ds||scan.datum||new Date().toLocaleDateString('de-DE');
  let content=scan.text;
  let htmlContent=null;
  if(bilingual){
    showProg('Гңbersetze...','Arabische Гңbersetzung wird erstellt',30);
    const ar=await translateToAr(scan.text);
    if(ar){
      htmlContent='<div><div style="display:inline-block;background:#1B3A28;color:#fff;padding:4px 12px;border-radius:20px;font-size:10pt;margin-bottom:10px">рҹҮ©рҹҮӘ Deutsch</div>'+mdParse(scan.text)+'</div><hr style="margin:20px 0;border:1px solid #C8953A"><div dir="rtl"><div style="display:inline-block;background:#1B3A28;color:#fff;padding:4px 12px;border-radius:20px;font-size:10pt;margin-bottom:10px">рҹҮёрҹҮҰ Ш№ШұШЁЩҠ</div><div style="font-family:Arial;line-height:1.9">'+mdParse(ar)+'</div></div>';
    }
    hideProg();
  }
  const b={id:Date.now(),titel:(bilingual?'рҹҢҗ ':'')+'Scan: '+title+' В· '+datum,text:content,html:htmlContent,userName:currentUser||'?',datum:datum,ts:new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})};
  berichte.unshift(b);
  if(berichte.length>100)berichte=berichte.slice(0,100);
  const ok=await sSet('agri-berichte',berichte);
  if(ok)toast('вң… '+(bilingual?'DE+AR ':'')+'Bericht gespeichert');
  else toast('вҡ пёҸ Speichern fehlgeschlagen');
  if(btn){btn.disabled=false;btn.textContent=bilingual?'рҹ’ҫ DE+AR':'рҹ’ҫ DE';}
}

async function runAllScans() {
  const btn=$('scan-run-btn'); if(btn){btn.disabled=true;btn.textContent='Scannt...';}
  const keys=['recht','foerder','markt','politik'];
  const lbls=['Rechtslage','FГ¶rderungen','Marktlage','Politik'];
  const pb=$('scan-pb'); const sb=$('scan-status');
  if(sb)sb.style.display='flex';
  for(let i=0;i<keys.length;i++){
    const st=$('scan-st'); if(st)st.textContent='Scanne ('+(i+1)+'/4): '+lbls[i]+'...';
    if(pb)pb.style.width=(i/4*90)+'%';
    await runScan(keys[i]);
  }
  if(pb)pb.style.width='100%';
  setTimeout(()=>{if(sb)sb.style.display='none';if(pb)pb.style.width='0%';},800);
  const sl=$('scan-last');if(sl)sl.textContent='Letzter Scan: '+new Date().toLocaleString('de-DE');
  if(btn){btn.disabled=false;btn.textContent='в–¶ Erneut scannen';}
}

async function runMatch() {
  const out=$('match-out'); if(!out) return;
  const btn=$('match-btn'); if(btn){btn.disabled=true;btn.textContent='Analysiere...';}
  out.innerHTML='<div style="color:var(--olive2)">KI analysiert...</div>';
  try{
    const saved=await sGet('scan-results')||{};
    const scanTxt=Object.entries(saved).map(([k,v])=>'['+k.toUpperCase()+']: '+v.text).join('\n\n');
    if(!scanTxt){out.innerHTML='<div style="color:var(--atx)">Bitte erst scannen!</div>';return;}
    const it=ideen.length?ideen.map(i=>'- '+i.titel).join('\n'):'(keine)';
    const kt=kontakte.length?kontakte.map(k=>'- '+k.name+' ('+k.kat+')').join('\n'):'(keine)';
    const prompt='SCANS:\n'+scanTxt+'\n\nIDEEN:\n'+it+'\n\nKONTAKTE:\n'+kt+'\n\nWelche Programme passen KONKRET zu unseren Ideen/Kontakten? Max 5 Matches. Format: рҹҺҜ [Programm] вҶ’ passt zu [Idee/Kontakt] weil [Grund].';
    const data=await callAI('kapital',prompt,'match');
    const text=getAIText(data);
    out.innerHTML='<div class="md" style="font-size:12px">'+mdParse(text)+'</div>';
    refreshCost();
  }catch(e){out.innerHTML='<div style="color:var(--rtx)">Fehler: '+esc(e.message)+'</div>';}
  if(btn){btn.disabled=false;btn.textContent='рҹҺҜ Analysieren';}
}

  const modLabel={markt:'рҹ”Қ',finanz:'рҹ’¶',kapital:'рҹ’Ў',compliance:'рҹӣЎпёҸ'};
  const ico=modLabel[modul]||'рҹ“Ӣ';
  const datum=new Date().toLocaleDateString('de-DE');
  const ts=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  const b={id:Date.now(),titel:ico+' '+titel.substring(0,70)+' В· '+datum,text:text,userName:currentUser||'?',datum,ts,auto:true};
  berichte.unshift(b);
  if(berichte.length>100)berichte=berichte.slice(0,100);
  const ok=await sSet('agri-berichte',berichte);
  if(ok){ toast('вң… Automatisch gespeichert'); if(btn){const o=btn.textContent;btn.textContent='вң…';setTimeout(()=>btn.textContent=o,1500);} }
}

async function saveManualReport() {
  const text=safe($('add-text')?.value||'');
  const titel=safe($('add-titel')?.value||'');
  if(!text){toast('Bitte Text einfГјgen');return;}
  if(!titel){$('add-titel')?.focus();toast('Bitte Titel eingeben');return;}

function openPDF(title, rawContent) {
  // Always render text content properly
  let content='';
  if(safe(rawContent)) {
    const stripped=(rawContent||'').replace(/<[^>]+>/g,' ').trim();
    if(stripped&&stripped!=='undefined'&&stripped.length>3) content=rawContent;
  }
  if(!content) content='<p style="color:#888;font-family:Arial">Kein Inhalt verfГјgbar.</p>';

  const win=window.open('','_blank','width=900,height=700');
  if(!win){alert('Popup-Blocker deaktivieren');return;}
  const d=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(title||'Bericht')}</title>
<style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:0 30px;color:#1a1a1a;line-height:1.75;font-size:11pt}
h1{font-size:20pt;color:#1B3A28;border-bottom:2px solid #C8953A;padding-bottom:8px;margin-bottom:6px}
h2{font-size:14pt;color:#1B3A28;margin:18px 0 6px}h3{font-size:12pt;color:#264D35;margin:14px 0 4px}
p{margin:6px 0}ul,ol{padding-left:22px;margin:6px 0}li{margin:3px 0}
a{color:#C8953A}hr{border:none;border-top:1px solid #ddd;margin:14px 0}strong{font-weight:700}
.meta{color:#888;font-size:9pt;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #eee}
.print-btn{position:fixed;top:16px;right:16px;background:#1B3A28;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:11pt;cursor:pointer}
@media print{.print-btn{display:none}}</style></head><body>
<button class="print-btn" onclick="window.print()">в¬Ү Als PDF</button>
<h1>${esc(title||'Bericht')}</h1>
<div class="meta">Erstellt: ${d} В· Agri Syria Export Tool</div>
${content}</body></html>`);
  win.document.close();
}

function openReport(id) {
  const b=berichte.find(x=>x.id===id);
  if(!b){toast('Bericht nicht gefunden');return;}
  // Get content - prefer html if valid, else text
  const htmlStripped=safe((b.html||'').replace(/<[^>]+>/g,' '));
  const textOk=safe(b.text||'');
  let content='';
  if(htmlStripped && htmlStripped.length>5) {
    content=b.html;
  } else if(textOk && textOk.length>5) {
    content='<div style="white-space:pre-wrap;font-family:Arial;line-height:1.8">'+esc(textOk)+'</div>';
  }
  openPDF(b.titel||'Bericht', content);
}

function renderBerichte() {
  berichte=berichte.filter(b=>b&&b.id&&safe(b.titel||''));
  setT('ber-cnt', berichte.length+' Berichte');
  const el=$('ber-list'); if(!el)return;
  if(!berichte.length){el.innerHTML='<div class="empty">рҹ“„<br>Noch keine Berichte.<br><small>Jede Recherche wird automatisch gespeichert.</small></div>';return;}
  el.innerHTML=berichte.map(b=>{
    const raw=safe((b.text||b.html||'').replace(/<[^>]+>/g,' '));
    const preview=raw.substring(0,90);
    const isEmpty=!raw||raw.length<5;
    return `<div class="ber-item">
      <div style="font-size:22px;opacity:.6">${b.auto?'рҹӨ–':'рҹ“„'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${esc(b.titel||'')}</div>
        <div style="font-size:11px;color:var(--ink3)">${b.datum||''} ${b.ts||''} В· рҹ‘Ө ${esc(b.userName||'?')}</div>
        ${isEmpty?'<div style="font-size:11px;color:var(--rtx)">вҡ пёҸ Kein Inhalt вҖ“ lГ¶schen und neu erstellen</div>':`<div style="font-size:11px;color:var(--ink4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(preview)}...</div>`}
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn bp bs" onclick="openReport(${b.id})">в¬Ү PDF</button>
        <button class="btn bd bs" onclick="deleteBericht(${b.id})">рҹ—‘</button>
      </div>
    </div>`;
  }).join('');
}

function deleteBericht(id){
  if(!confirm('Bericht lГ¶schen?'))return;
  berichte=berichte.filter(b=>b.id!==id);
  sSet('agri-berichte',berichte); renderBerichte();
}

async function clearBerichte(){
  if(!confirm('Alle Berichte lГ¶schen?'))return;
  berichte=[]; await sSet('agri-berichte',[]); renderBerichte();
}

function exportBerichte(){
  if(!berichte.length){toast('Keine Berichte vorhanden');return;}
  const blob=new Blob([JSON.stringify(berichte,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='berichte-'+new Date().toLocaleDateString('de-DE').replace(/\./g,'-')+'.json';
  a.click(); toast('рҹ“Ҙ Backup heruntergeladen');
}

async function importBerichte(input){
  const file=input.files[0]; if(!file){return;}
  input.value='';
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){toast('вқҢ UngГјltiges Format вҖ“ bitte .json Backup-Datei');return;}
      const existing=new Set(berichte.map(b=>b.id));
      const neu=data.filter(b=>b&&b.id&&!existing.has(b.id));
      berichte=[...neu,...berichte].slice(0,100);
      await sSet('agri-berichte',berichte);
      renderBerichte(); toast('вң… '+neu.length+' Berichte importiert');
    }catch{toast('вқҢ Keine gГјltige JSON-Datei. Nutze вңҸпёҸ Text fГјr PDFs.');}
  };
  reader.readAsText(file);
}

async function importPDF(input){
  const file=input.files[0]; if(!file){return;}
  input.value='';
  openModal('modal-add-report');
  const ta=$('add-text'), ti=$('add-titel');
  if(ta)ta.value='PDF wird gelesen...';
  if(ti)ti.value=file.name.replace('.pdf','');
  try{
    if(typeof pdfjsLib==='undefined'){if(ta)ta.value='';toast('PDF.js nicht geladen. Bitte Text manuell einfГјgen.');return;}
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let txt='';
    for(let i=1;i<=pdf.numPages;i++){
      if(ta)ta.value='Lese Seite '+i+'/'+pdf.numPages+'...';
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      txt+=(i>1?'\n\n--- Seite '+i+' ---\n\n':'')+tc.items.map(x=>x.str).join(' ');
    }
    if(ta)ta.value=txt.trim();
    if(ti)ti.focus();
    toast('вң… PDF gelesen: '+pdf.numPages+' Seite(n)');
  }catch(e){
    if(ta)ta.value='';
    toast('Fehler beim PDF lesen: '+e.message);
  }
}

function addIdea(){

  ideen.push({id:Date.now(),titel:t,b:$('id-desc')?.value||'',p:$('id-prio')?.value||'mittel',k:$('id-kat')?.value||'export',d:new Date().toLocaleDateString('de-DE'),u:currentUser||'?'});

const acCache={};
async function actionPlan(key,prompt,isAr){
  const baseKey=key.replace('_ar','');
  const exEl=$(baseKey+'-exp'); if(!exEl)return;
  exEl.classList.add('on');
  if(acCache[key]){setH(exEl,acCache[key]);try{exEl.scrollIntoView({behavior:'smooth',block:'nearest'});}catch{}return;}
  exEl.innerHTML='<div style="padding:8px">'+(isAr?'Ш¬Ш§ШұЩҚ Ш§Щ„ШӘШӯЩ…ЩҠЩ„...':'Lade Anleitung...')+'</div>';
  try{
    const sys=isAr?'kapital_ar':'kapital_de';
    const data=await callAI(sys,prompt,'kapital');
    const text=getAIText(data);
    if(!safe(text))throw new Error('Keine Antwort');
    const dir=isAr?'rtl':'ltr';
    const c=data._cost?'<div style="font-size:10px;color:var(--ink4);margin-top:8px">рҹ’° '+fmtS(data._cost.costUSD)+'</div>':'';
    const pdfBtn='<button class="btn bp bs" style="margin-top:10px" onclick="openPDF(\'Anleitung\',document.getElementById(\''+baseKey+'-exp\')?.innerHTML||\'\')" >в¬Ү PDF</button>';
    acCache[key]='<div dir="'+dir+'" class="md">'+mdParse(text)+'</div>'+c+pdfBtn;
    setH(exEl,acCache[key]);
    try{exEl.scrollIntoView({behavior:'smooth',block:'nearest'});}catch{}
    refreshCost();
  }catch(e){exEl.innerHTML='<div style="color:var(--rtx);padding:8px">Fehler: '+esc(e.message)+'</div>';}
}

async function loadCosts(){
  try{
    const log=await fetch('/api/costs').then(r=>r.json())||[];
    const total=log.reduce((s,e)=>s+(e.costUSD||0),0);
    const totTok=log.reduce((s,e)=>s+(e.inputTokens||0)+(e.outputTokens||0),0);
    setH('cost-stats',`<div class="stat"><div class="stat-v">${fmt(total)}</div><div class="stat-l">Gesamtkosten</div></div><div class="stat"><div class="stat-v">${log.length}</div><div class="stat-l">API-Calls</div></div><div class="stat"><div class="stat-v">${totTok.toLocaleString('de-DE')}</div><div class="stat-l">Tokens</div></div><div class="stat"><div class="stat-v">${log.length?fmt(total/log.length):'$0.0000'}</div><div class="stat-l">Гҳ/Call</div></div>`);
    const ML={markt:'Markt',finanz:'Finanz',kapital:'Kapital',scan_recht:'Scan:Recht',scan_foerder:'Scan:FГ¶rder',scan_markt:'Scan:Markt',scan_politik:'Scan:Politik',translate:'Гңbersetz.',match:'Match'};
    const tbody=$('cost-tbody'); if(!tbody)return;
    if(!log.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--ink4)">Noch keine Calls.</td></tr>';return;}
    tbody.innerHTML=log.map(e=>{const d=new Date(e.ts);const z=d.toLocaleDateString('de-DE')+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});return`<tr><td style="white-space:nowrap;color:var(--ink3)">${z}</td><td><span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gbg);color:var(--gtx)">${ML[e.modul]||e.modul||'?'}</span></td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">рҹ‘Ө ${esc(e.userName||'?')} В· ${esc(e.query||'вҖ“')}</td><td style="text-align:right;color:var(--ink3)">${(e.inputTokens||0).toLocaleString()}</td><td style="text-align:right;font-weight:600;color:var(--olive)">${fmtS(e.costUSD||0)}</td></tr>`;}).join('');
  }catch{}
}
